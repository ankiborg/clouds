name: SwiftWatch agents

on:
  schedule:
    - cron: '*/30 * * * *'   # harvest — every 30 minutes
    - cron: '0 */6 * * *'    # patterns — every 6 hours
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  harvest:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '*/30')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger harvest agent
        run: |
          curl -sf -X POST "${{ secrets.VERCEL_APP_URL }}/api/agents/harvest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  patterns:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 */6')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pattern agent
        run: |
          curl -sf -X POST "${{ secrets.VERCEL_APP_URL }}/api/agents/patterns" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
